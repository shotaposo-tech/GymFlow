<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GymFlow Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-touch-callout: none; -webkit-user-select: none; background: #0f172a; color: #f8fafc; }
        .hidden { display: none !important; }
        #login-overlay { position: fixed; inset: 0; z-index: 100; background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #loading-overlay { position: fixed; inset: 0; z-index: 200; background: #0f172a; display: flex; items-center justify-center; }
        .done { opacity: 0.15; filter: grayscale(1); }
        .active-tab { color: #3b82f6; border-bottom: 3px solid #3b82f6; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="text-blue-500 font-bold animate-pulse text-sm tracking-widest uppercase">Checking Access...</div>
    </div>

    <div id="login-overlay" class="hidden">
        <h1 class="text-4xl font-black mb-2 text-white italic tracking-tighter">GymFlow Pro</h1>
        <p class="text-slate-400 text-[10px] mb-12 uppercase tracking-[0.3em]">Cloud Sync Enabled</p>
        <button id="login-btn" class="bg-white text-slate-900 font-bold py-4 px-10 rounded-2xl flex items-center gap-3 shadow-2xl active:scale-95 transition-all">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            Googleでログイン
        </button>
    </div>

    <div id="app-content" class="hidden">
        <nav class="bg-slate-900/80 backdrop-blur-md sticky top-0 z-10 pt-10 pb-2 border-b border-slate-700">
            <div class="flex justify-between items-center px-6 mb-2">
                <span id="user-name" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">USER</span>
                <span id="save-status" class="text-[9px] font-bold text-emerald-500 uppercase tracking-widest">● Cloud Synced</span>
            </div>
            <div class="flex justify-around text-center font-bold">
                <button id="tabA" class="flex-1 py-3 active-tab text-xs">Menu A</button>
                <button id="tabB" class="flex-1 py-3 text-slate-500 text-xs">Menu B</button>
            </div>
        </nav>
        <main class="p-4 space-y-5" id="menu-content"></main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithPopup, onAuthStateChanged, browserLocalPersistence, setPersistence, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEq0qGFrNvQeBDRffBMXb-m5xa3bPYlMg",
            authDomain: "gymflmw.firebaseapp.com",
            projectId: "gymflmw",
            storageBucket: "gymflmw.firebasestorage.app",
            messagingSenderId: "809437611804",
            appId: "1:809437611804:web:900ad03105f67cf41a9cd9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // ポップアップログイン（ウイスキーアプリで成功した方式）
        document.getElementById('login-btn').onclick = async () => {
            try {
                await setPersistence(auth, browserLocalPersistence);
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Login Error:", error);
                alert("ログインに失敗しました。iPhoneの『サイト越えトラッキングを防ぐ』がONの場合、オフにして試してください。");
            }
        };

        // 状態監視
        onAuthStateChanged(auth, async (user) => {
            document.getElementById('loading-overlay').classList.add('hidden');
            if (user) {
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                document.getElementById('user-name').innerText = user.displayName;
                loadData(user.uid);
            } else {
                document.getElementById('login-overlay').classList.remove('hidden');
                document.getElementById('app-content').classList.add('hidden');
            }
        });

        // --- 筋トレロジック (省略せず維持) ---
        let cloudData = {};
        let currentMenu = 'A';
        const menuA = [
            { name: "CHEST PRESS", settings: "Seat:6 / Arm:1", type: "strength" },
            { name: "LAT PULLDOWN", settings: "Standard", type: "strength" },
            { name: "ABDOMINAL CRUNCH", settings: "Seat:5", type: "strength" }
        ];
        const menuB = [
            { name: "LEG PRESS", settings: "Seat:2", type: "strength" },
            { name: "LEG EXTENSION", settings: "Seat:4 / Range:11 / Ankle:L", type: "strength" }
        ];

        async function loadData(uid) {
            const docSnap = await getDoc(doc(db, "users", uid));
            if (docSnap.exists()) cloudData = docSnap.data();
            render();
        }

        window.autoSave = async () => {
            const user = auth.currentUser;
            if (!user) return;
            document.getElementById('save-status').innerText = "● Syncing...";
            const data = currentMenu === 'A' ? menuA : menuB;
            const updates = { ...cloudData };
            data.forEach((item, idx) => {
                const w = document.getElementById(`weight-${idx}`);
                const r1 = document.getElementById(`r1-${idx}`);
                const c = document.getElementById(`check-${idx}`);
                if(w) updates[item.name] = { weight: w.value, r1: r1.value, done: c.checked };
            });
            await setDoc(doc(db, "users", user.uid), updates);
            cloudData = updates;
            document.getElementById('save-status').innerText = "● Cloud Synced";
        };

        function render() {
            const container = document.getElementById('menu-content');
            const data = currentMenu === 'A' ? menuA : menuB;
            container.innerHTML = data.map((item, idx) => `
                <section class="bg-slate-800/40 p-5 rounded-3xl border border-slate-700 ${cloudData[item.name]?.done ? 'done' : ''}" id="item-${idx}">
                    <div class="flex justify-between items-start mb-4">
                        <h2 class="font-black text-white uppercase">${item.name}</h2>
                        <input type="checkbox" id="check-${idx}" class="w-7 h-7" ${cloudData[item.name]?.done ? 'checked' : ''} onchange="window.autoSave()">
                    </div>
                    <div class="flex gap-2">
                        <input type="number" placeholder="KG" class="w-full bg-slate-900 p-3 rounded-xl text-blue-400 font-black text-center" id="weight-${idx}" value="${cloudData[item.name]?.weight || ''}" onblur="window.autoSave()">
                        <input type="number" placeholder="Reps" class="w-full bg-slate-900 p-3 rounded-xl text-white font-black text-center" id="r1-${idx}" value="${cloudData[item.name]?.r1 || ''}" onblur="window.autoSave()">
                    </div>
                </section>
            `).join('');
        }

        document.getElementById('tabA').onclick = () => { currentMenu = 'A'; render(); };
        document.getElementById('tabB').onclick = () => { currentMenu = 'B'; render(); };
    </script>
</body>
</html>
