<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alt-Fit</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Alt-Fit">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2936/2936886.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-touch-callout: none; -webkit-user-select: none; }
        .done { background-color: #f3f4f6; opacity: 0.6; }
        .active-tab { border-bottom: 4px solid #3b82f6; color: #3b82f6; }
        /* iPhoneのノッチ（上部）対策 */
        header { padding-top: env(safe-area-inset-top); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24 text-slate-800">

    <nav class="bg-white shadow-sm sticky top-0 z-10 pt-8">
        <div class="flex justify-around text-center font-bold">
            <button id="tabA" onclick="switchMenu('A')" class="flex-1 py-4 active-tab transition-all">Aメニュー</button>
            <button id="tabB" onclick="switchMenu('B')" class="flex-1 py-4 text-gray-400 transition-all">Bメニュー</button>
        </div>
    </nav>

    <main class="p-4 space-y-4" id="menu-content">
        </main>

    <footer class="fixed bottom-0 left-0 w-full p-4 bg-white/80 backdrop-blur-md border-t flex gap-4 items-center pb-8">
        <button onclick="saveSession()" class="flex-1 bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition">
            トレーニング完了保存
        </button>
        <button onclick="resetData()" class="text-[10px] text-gray-300">RESET</button>
    </footer>

    <script>
        const menuA = [
            { name: "チェストプレス", type: "strength", goal: "10回 × 3セット" },
            { name: "ラットプルダウン", type: "strength", goal: "10回 × 3セット" },
            { name: "アブドミナルクランチ", type: "strength", goal: "10回 × 3セット" },
            { name: "トレッドミル：インターバル", type: "timer", detail: "1分UP → (1分RUN/2分WALK)x4 → 2分DOWN", duration: 900 },
            { name: "プランク", type: "plank", goal: "45秒 × 2セット", duration: 45 }
        ];

        const menuB = [
            { name: "レッグプレス", type: "strength", goal: "10回 × 3セット" },
            { name: "レッグエクステンション", type: "strength", goal: "10回 × 3セット" },
            { name: "トレッドミル：ウォーキング", type: "timer", detail: "20分 一定ペース", duration: 1200 },
            { name: "プランク", type: "plank", goal: "45秒 × 2セット", duration: 45 }
        ];

        let currentMenu = 'A';

        function switchMenu(type) {
            currentMenu = type;
            document.getElementById('tabA').className = type === 'A' ? 'flex-1 py-4 active-tab' : 'flex-1 py-4 text-gray-400';
            document.getElementById('tabB').className = type === 'B' ? 'flex-1 py-4 active-tab' : 'flex-1 py-4 text-gray-400';
            render();
        }

        function render() {
            const container = document.getElementById('menu-content');
            const data = currentMenu === 'A' ? menuA : menuB;
            
            container.innerHTML = data.map((item, idx) => `
                <section class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 transition-all" id="item-${idx}">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <h2 class="font-extrabold text-slate-800 text-lg">${item.name}</h2>
                            <p class="text-blue-500 text-xs font-bold mt-1 uppercase tracking-wider">${item.goal || item.detail}</p>
                        </div>
                        <input type="checkbox" class="w-8 h-8 rounded-full border-gray-200 text-blue-600 focus:ring-blue-500" onchange="markDone(${idx}, this)">
                    </div>
                    
                    ${item.type === 'strength' ? `
                        <div class="flex items-center gap-3 mt-4">
                            <input type="number" inputmode="decimal" placeholder="0" class="w-24 p-3 bg-slate-50 border-none rounded-2xl text-center text-xl font-bold focus:ring-2 focus:ring-blue-500" id="weight-${idx}">
                            <span class="text-lg font-bold text-slate-400 px-1">kg</span>
                            <div class="ml-auto text-right">
                                <span class="block text-[10px] text-gray-400 uppercase tracking-tighter">Previous</span>
                                <span class="text-sm font-mono font-bold text-slate-500">${getPrevWeight(item.name)} kg</span>
                            </div>
                        </div>
                    ` : ''}

                    ${item.type === 'timer' || item.type === 'plank' ? `
                        <div class="flex items-center justify-between mt-4 bg-slate-50 p-3 rounded-2xl">
                            <span class="font-mono text-2xl font-bold text-slate-700" id="timer-display-${idx}">${Math.floor(item.duration/60)}:00</span>
                            <button onclick="startTimer(${item.duration}, 'timer-display-${idx}')" class="bg-slate-800 text-white font-bold px-6 py-2 rounded-xl active:bg-blue-600 transition">START</button>
                        </div>
                    ` : ''}
                </section>
            `).join('');
        }

        function startTimer(seconds, displayId) {
            let timeLeft = seconds;
            const display = document.getElementById(displayId);
            const interval = setInterval(() => {
                const m = Math.floor(timeLeft / 60);
                const s = timeLeft % 60;
                display.innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    if (window.navigator.vibrate) window.navigator.vibrate([200, 100, 200]);
                    alert("Time is up!");
                }
                timeLeft--;
            }, 1000);
        }

        function markDone(idx, cb) {
            document.getElementById(`item-${idx}`).classList.toggle('done', cb.checked);
        }

        function getPrevWeight(name) {
            return localStorage.getItem(`prev-${name}`) || '--';
        }

        function saveSession() {
            const data = currentMenu === 'A' ? menuA : menuB;
            data.forEach((item, idx) => {
                if(item.type === 'strength') {
                    const val = document.getElementById(`weight-${idx}`).value;
                    if(val) localStorage.setItem(`prev-${item.name}`, val);
                }
            });
            alert("記録完了！お疲れ様でした。");
            location.reload();
        }

        function resetData() {
            if(confirm("全ての重量記録を消去しますか？")) {
                localStorage.clear();
                location.reload();
            }
        }

        render();
    </script>
</body>
</html>
