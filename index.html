<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GymFlow Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-touch-callout: none; -webkit-user-select: none; background: #0f172a; color: #f8fafc; overflow-x: hidden; font-family: sans-serif; }
        .hidden { display: none !important; }
        #login-overlay { position: fixed; inset: 0; z-index: 100; background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #loading-overlay { position: fixed; inset: 0; z-index: 200; background: #0f172a; display: flex; align-items: center; justify-content: center; }
        .done { opacity: 0.3; filter: grayscale(0.8); border-color: #1e293b !important; }
        .active-tab { color: #3b82f6; border-bottom: 4px solid #3b82f6; }
        
        /* 巨大赤エフェクト */
        #praise-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 500;
            pointer-events: none;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.6, -0.28, 0.735, 0.045);
            transform: scale(2) rotate(-5deg);
        }
        #praise-overlay.show {
            opacity: 1;
            transform: scale(1) rotate(0deg);
            animation: shake 0.5s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .praise-text {
            color: #ff0000;
            font-size: 5rem;
            font-weight: 900;
            text-align: center;
            line-height: 1;
            text-shadow: 0 0 20px rgba(255,0,0,0.8), 0 0 40px rgba(255,0,0,0.4);
            letter-spacing: -0.05em;
            font-style: italic;
        }
    </style>
</head>
<body class="min-h-screen pb-24">

    <div id="loading-overlay">
        <div class="text-slate-500 font-bold animate-pulse text-xs tracking-widest uppercase">Syncing...</div>
    </div>

    <div id="login-overlay" class="hidden">
        <h1 class="text-5xl font-black mb-12 text-white italic tracking-tighter text-center leading-none">GYM<br>FLOW</h1>
        <button id="login-btn" class="bg-white text-slate-900 font-bold py-4 px-10 rounded-2xl flex items-center gap-3 active:scale-95 transition-all">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            Googleでログイン
        </button>
    </div>

    <div id="praise-overlay">
        <div id="praise-target" class="praise-text">MAX POWER!</div>
    </div>

    <div id="app-content" class="hidden">
        <nav class="bg-slate-900/95 backdrop-blur-xl sticky top-0 z-10 pt-12 pb-1 border-b border-slate-700">
            <div class="flex justify-around items-end font-bold px-4">
                <button id="tabA" class="flex-1 py-4 active-tab transition-all uppercase tracking-widest text-xs">Menu A</button>
                <button id="tabB" class="flex-1 py-4 text-slate-500 transition-all uppercase tracking-widest text-xs">Menu B</button>
                <button onclick="window.resetChecks()" class="ml-4 mb-4 bg-slate-800 text-slate-400 text-[10px] px-3 py-1 rounded-full border border-slate-600 active:bg-red-900 active:text-white transition-all">Reset All</button>
            </div>
        </nav>
        <main class="p-4 space-y-6" id="menu-content"></main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithPopup, onAuthStateChanged, browserLocalPersistence, setPersistence, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEq0qGFrNvQeBDRffBMXb-m5xa3bPYlMg",
            authDomain: "gymflmw.firebaseapp.com",
            projectId: "gymflmw",
            storageBucket: "gymflmw.firebasestorage.app",
            messagingSenderId: "809437611804",
            appId: "1:809437611804:web:900ad03105f67cf41a9cd9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let cloudData = {};
        let currentMenu = 'A';
        let activeTimers = {};

        const praises = ["限界突破！", "新記録！", "覚醒！", "ヤバすぎる！", "最強！", "OVER LIMIT!"];

        document.getElementById('login-btn').onclick = async () => {
            try {
                await setPersistence(auth, browserLocalPersistence);
                await signInWithPopup(auth, provider);
            } catch (e) { alert("Login Error"); }
        };

        onAuthStateChanged(auth, async (user) => {
            document.getElementById('loading-overlay').classList.add('hidden');
            if (user) {
                currentUser = user;
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                await loadData();
            } else {
                document.getElementById('login-overlay').classList.remove('hidden');
                document.getElementById('app-content').classList.add('hidden');
            }
        });

        async function loadData() {
            if (!currentUser) return;
            const docSnap = await getDoc(doc(db, "users", currentUser.uid));
            if (docSnap.exists()) cloudData = docSnap.data();
            render();
        }

        window.showPraise = () => {
            const overlay = document.getElementById('praise-overlay');
            const target = document.getElementById('praise-target');
            target.innerText = praises[Math.floor(Math.random() * praises.length)];
            overlay.classList.add('show');
            setTimeout(() => overlay.classList.remove('show'), 1500);
        };

        window.autoSave = async (isCheck = false) => {
            if (!currentUser) return;
            const updates = { ...cloudData };
            const data = currentMenu === 'A' ? menuA : menuB;
            let hasRecordUpdate = false;

            data.forEach((item, idx) => {
                const c = document.getElementById(`check-${idx}`);
                if (item.type === 'strength') {
                    const w = document.getElementById(`weight-${idx}`).value;
                    const r1 = document.getElementById(`r1-${idx}`).value;
                    const r2 = document.getElementById(`r2-${idx}`).value;
                    const r3 = document.getElementById(`r3-${idx}`).value;
                    
                    const prev = cloudData[item.name] || {};
                    const total = Number(r1) + Number(r2) + Number(r3);
                    const prevTotal = Number(prev.r1||0) + Number(prev.r2||0) + Number(prev.r3||0);
                    
                    if (isCheck && c.checked && (Number(w) > Number(prev.weight||0) || total > prevTotal)) {
                        hasRecordUpdate = true;
                    }
                    updates[item.name] = { weight: w, r1: r1, r2: r2, r3: r3, done: c.checked };
                } else {
                    if(c) updates[item.name] = { ...cloudData[item.name], done: c.checked };
                }
            });

            if (hasRecordUpdate) window.showPraise();
            await setDoc(doc(db, "users", currentUser.uid), updates);
            cloudData = updates;
        };

        window.resetChecks = async () => {
            if (!confirm("全てのチェックを外しますか？（数値は残ります）")) return;
            Object.keys(cloudData).forEach(key => cloudData[key].done = false);
            await setDoc(doc(db, "users", currentUser.uid), cloudData);
            render();
        };

        window.handleInput = (el, nextId) => {
            if (el.value.length >= 2 && nextId) document.getElementById(nextId).focus();
            window.autoSave();
        };

        const menuA = [
            { name: "CHEST PRESS", settings: "Seat:6 / Arm:1", type: "strength" },
            { name: "LAT PULLDOWN", settings: "Standard", type: "strength" },
            { name: "ABDOMINAL CRUNCH", settings: "Seat:5", type: "strength" },
            { name: "TREADMILL", settings: "15min Interval", type: "cardio" },
            { name: "PLANK", settings: "45s x 2sets", type: "plank", duration: 45 }
        ];
        const menuB = [
            { name: "LEG PRESS", settings: "Seat:2", type: "strength" },
            { name: "LEG EXTENSION", settings: "Seat:4 / Range:11 / Ankle:L", type: "strength" },
            { name: "TREADMILL", settings: "20min Walking", type: "cardio" },
            { name: "PLANK", settings: "45s x 2sets", type: "plank", duration: 45 }
        ];

        window.startTimer = (seconds, idx) => {
            if (activeTimers[idx]) return;
            let timeLeft = seconds;
            const display = document.getElementById(`timer-display-${idx}`);
            activeTimers[idx] = setInterval(() => {
                timeLeft--;
                display.innerText = `00:${String(timeLeft).padStart(2,'0')}`;
                if (timeLeft <= 0) { clearInterval(activeTimers[idx]); delete activeTimers[idx]; }
            }, 1000);
        };

        function render() {
            const container = document.getElementById('menu-content');
            const data = currentMenu === 'A' ? menuA : menuB;
            container.innerHTML = data.map((item, idx) => {
                const prev = cloudData[item.name] || {};
                return `
                <section class="bg-slate-800/60 p-5 rounded-[2rem] border-2 border-slate-700 shadow-2xl ${prev.done ? 'done' : ''}" id="item-${idx}">
                    <div class="flex justify-between items-start mb-5">
                        <div class="flex-1">
                            <h2 class="font-black text-white text-xl tracking-tight uppercase leading-tight">${item.name}</h2>
                            <p class="text-emerald-400 text-[10px] font-bold uppercase tracking-widest mt-1 opacity-70">${item.settings}</p>
                        </div>
                        <input type="checkbox" id="check-${idx}" class="w-9 h-9 rounded-full border-2 border-slate-600 bg-slate-700 checked:bg-blue-500 transition-all" ${prev.done ? 'checked' : ''} onchange="document.getElementById('item-${idx}').classList.toggle('done', this.checked); window.autoSave(true);">
                    </div>
                    ${item.type === 'strength' ? `
                        <div class="space-y-3">
                            <div class="flex items-center bg-slate-900/80 p-3 rounded-xl border border-slate-600">
                                <input type="number" inputmode="decimal" class="w-full bg-transparent text-2xl font-black text-blue-400 text-center outline-none" id="weight-${idx}" value="${prev.weight || ''}" onfocus="this.select()" onblur="window.autoSave()" placeholder="0.0">
                                <span class="absolute right-12 text-[9px] text-slate-500 font-black uppercase">KG</span>
                            </div>
                            <div class="flex justify-between gap-2">
                                ${[1,2,3].map(n => `
                                    <input type="number" inputmode="numeric" placeholder="R${n}" class="w-full bg-slate-900/80 p-3 rounded-xl text-xl font-black text-white text-center border border-slate-600 outline-none focus:border-blue-500 transition-all" id="r${n}-${idx}" value="${prev['r'+n] || ''}" onfocus="this.select()" oninput="window.handleInput(this, ${n<3 ? `'r${n+1}-${idx}'` : 'null'})">
                                `).join('')}
                            </div>
                        </div>
                    ` : (item.type === 'plank' ? `
                        <div class="bg-slate-900/80 p-4 rounded-xl border border-slate-600 flex justify-between items-center">
                            <span class="font-mono text-3xl font-black text-blue-400" id="timer-display-${idx}">00:${item.duration}</span>
                            <button onclick="window.startTimer(${item.duration}, ${idx})" class="bg-blue-600 text-white font-black px-8 py-3 rounded-lg uppercase text-[10px] shadow-lg active:scale-95 transition-all">Start</button>
                        </div>
                    ` : '')}
                </section>
            `}).join('');
        }

        window.switchMenu = (type) => {
            currentMenu = type;
            document.getElementById('tabA').className = type === 'A' ? 'flex-1 py-4 active-tab' : 'flex-1 py-4 text-slate-500';
            document.getElementById('tabB').className = type === 'B' ? 'flex-1 py-4 active-tab' : 'flex-1 py-4 text-slate-500';
            render();
        };

        document.getElementById('tabA').onclick = () => window.switchMenu('A');
        document.getElementById('tabB').onclick = () => window.switchMenu('B');
    </script>
</body>
</html>
