<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GymFlow Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            -webkit-touch-callout: none; 
            -webkit-user-select: none; 
            background: radial-gradient(circle at top, #1e293b, #0f172a);
        }
        .done { opacity: 0.2; filter: grayscale(1); }
        .active-tab { color: #3b82f6; border-bottom: 3px solid #3b82f6; }
        .badge-anim { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>
<body class="min-h-screen pb-32 text-slate-200">

    <nav class="bg-slate-900/80 backdrop-blur-md sticky top-0 z-10 pt-10 pb-2 border-b border-slate-700">
        <div class="flex justify-around text-center font-bold">
            <button id="tabA" class="flex-1 py-3 active-tab transition-all uppercase tracking-widest text-xs">Menu A</button>
            <button id="tabB" class="flex-1 py-3 text-slate-500 transition-all uppercase tracking-widest text-xs">Menu B</button>
        </div>
    </nav>

    <main class="p-4 space-y-4" id="menu-content"></main>

    <footer class="fixed bottom-0 left-0 w-full p-6 bg-slate-900/95 backdrop-blur-xl border-t border-slate-700 shadow-2xl">
        <button id="save-btn" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-[0_0_20px_rgba(59,130,246,0.4)] active:scale-95 transition-all uppercase tracking-widest text-sm text-center">
            Save to Cloud
        </button>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEq0qGFrNvQeBDRffBMXb-vN_UvVw",
            authDomain: "gymflmw.firebaseapp.com",
            projectId: "gymflmw",
            storageBucket: "gymflmw.firebasestorage.app",
            messagingSenderId: "809437611804",
            appId: "1:809437611804:web:900ad31057e93c1f202611",
            measurementId: "G-BKMHRE8V64"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const USER_ID = "my_personal_log";

        const menuA = [
            { id: "cp", name: "CHEST PRESS", settings: "Seat:6 / Arm:1", type: "strength" },
            { id: "lp", name: "LAT PULLDOWN", settings: "Standard", type: "strength" },
            { id: "ac", name: "ABDOMINAL CRUNCH", settings: "Seat:5", type: "strength" },
            { id: "ti", name: "TREADMILL INTERVAL", settings: "15min (1m RUN / 2m WALK)", type: "timer", duration: 900 },
            { id: "pk", name: "PLANK", settings: "45s x 2sets", type: "plank", duration: 45 }
        ];

        const menuB = [
            { id: "rp", name: "LEG PRESS", settings: "Seat:2", type: "strength" },
            { id: "le", name: "LEG EXTENSION", settings: "Seat:4 / Range:11 / Ankle:L", type: "strength" },
            { id: "tw", name: "TREADMILL WALKING", settings: "20min Constant", type: "timer", duration: 1200 },
            { id: "pkb", name: "PLANK", settings: "45s x 2sets", type: "plank", duration: 45 }
        ];

        let currentMenu = 'A';
        let cloudData = {};
        let activeTimers = {};

        async function loadData() {
            const docRef = doc(db, "users", USER_ID);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) { cloudData = docSnap.data(); }
            render();
        }

        function render() {
            const container = document.getElementById('menu-content');
            const data = currentMenu === 'A' ? menuA : menuB;
            
            container.innerHTML = data.map((item, idx) => `
                <section class="bg-slate-800/40 p-5 rounded-[1.5rem] border border-slate-700 shadow-lg relative" id="item-${idx}">
                    <div id="badge-${idx}" class="hidden absolute -top-2 -right-2 bg-orange-500 text-white text-[10px] font-black px-2 py-1 rounded-full shadow-lg badge-anim z-20">NEW RECORD 🔥</div>
                    
                    <div class="flex justify-between items-start mb-4">
                        <div class="max-w-[80%]">
                            <h2 class="font-black text-white text-base tracking-tight leading-tight uppercase">${item.name}</h2>
                            <p class="text-emerald-400 text-[10px] font-bold uppercase tracking-widest mt-1">⚙️ ${item.settings}</p>
                        </div>
                        <input type="checkbox" class="w-7 h-7 rounded-full border-slate-600 bg-slate-700 checked:bg-blue-500 focus:ring-0" onchange="document.getElementById('item-${idx}').classList.toggle('done', this.checked)">
                    </div>
                    
                    ${item.type === 'strength' ? `
                        <div class="space-y-4">
                            <div class="flex items-center bg-slate-900/60 p-3 rounded-xl border border-slate-700/50">
                                <span class="text-[9px] text-slate-500 font-black uppercase w-10 text-center">KG</span>
                                <input type="number" inputmode="decimal" placeholder="0" class="flex-1 bg-transparent text-xl font-black text-blue-400 text-center focus:outline-none" id="weight-${idx}" value="${cloudData[item.name]?.weight || ''}">
                                <span class="w-10"></span>
                            </div>
                            <div class="flex items-center gap-1">
                                <span class="text-[9px] text-slate-500 font-black uppercase w-10 text-center">REPS</span>
                                <div class="flex-1 flex items-center justify-between gap-2">
                                    <input type="number" inputmode="numeric" oninput="window.checkRecord(${idx}, '${item.name}')" placeholder="0" class="w-full bg-slate-900/60 p-2 rounded-lg text-lg font-black text-white text-center border border-slate-700/50 focus:border-blue-500 outline-none" id="r1-${idx}" value="${cloudData[item.name]?.r1 || ''}">
                                    <span class="text-slate-600 font-bold">-</span>
                                    <input type="number" inputmode="numeric" oninput="window.checkRecord(${idx}, '${item.name}')" placeholder="0" class="w-full bg-slate-900/60 p-2 rounded-lg text-lg font-black text-white text-center border border-slate-700/50 focus:border-blue-500 outline-none" id="r2-${idx}" value="${cloudData[item.name]?.r2 || ''}">
                                    <span class="text-slate-600 font-bold">-</span>
                                    <input type="number" inputmode="numeric" oninput="window.checkRecord(${idx}, '${item.name}')" placeholder="0" class="w-full bg-slate-900/60 p-2 rounded-lg text-lg font-black text-white text-center border border-slate-700/50 focus:border-blue-500 outline-none" id="r3-${idx}" value="${cloudData[item.name]?.r3 || ''}">
                                </div>
                            </div>
                            <div class="text-[9px] text-slate-500 font-bold px-1 uppercase tracking-tighter text-center pt-2 border-t border-slate-700/30">
                                Prev: ${cloudData[item.name]?.weight || '--'}kg (${cloudData[item.name]?.r1 || '-'}-${cloudData[item.name]?.r2 || '-'}-${cloudData[item.name]?.r3 || '-'})
                            </div>
                        </div>
                    ` : `
                        <div class="flex items-center justify-between bg-slate-900/60 p-3 rounded-xl border border-slate-700/50 mt-2">
                            <span class="font-mono text-2xl font-black text-blue-400" id="timer-display-${idx}">
                                ${item.duration === 45 ? '00:45' : Math.floor(item.duration/60) + ':00'}
                            </span>
                            <div class="flex gap-2">
                                <button id="timer-btn-${idx}" onclick="window.startTimer(${item.duration}, ${idx})" class="bg-blue-600 text-[10px] font-black px-4 py-3 rounded-lg active:bg-blue-400 transition uppercase tracking-widest">Start</button>
                                <button onclick="window.resetTimer(${item.duration}, ${idx})" class="bg-slate-700 text-[10px] font-black px-3 py-3 rounded-lg uppercase tracking-widest">Reset</button>
                            </div>
                        </div>
                    `}
                </section>
            `).join('');
            // 初期表示でバッジ判定
            data.forEach((item, idx) => { if(item.type === 'strength') window.checkRecord(idx, item.name); });
        }

        // バッジ判定ロジック
        window.checkRecord = (idx, name) => {
            const r1 = parseInt(document.getElementById(`r1-${idx}`).value) || 0;
            const r2 = parseInt(document.getElementById(`r2-${idx}`).value) || 0;
            const r3 = parseInt(document.getElementById(`r3-${idx}`).value) || 0;
            const currentTotal = r1 + r2 + r3;

            const pr1 = parseInt(cloudData[name]?.r1) || 0;
            const pr2 = parseInt(cloudData[name]?.r2) || 0;
            const pr3 = parseInt(cloudData[name]?.r3) || 0;
            const prevTotal = pr1 + pr2 + pr3;

            const badge = document.getElementById(`badge-${idx}`);
            if (currentTotal > prevTotal && prevTotal > 0) {
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        };

        window.startTimer = (seconds, idx) => {
            if (activeTimers[idx]) return;
            let timeLeft = seconds;
            const display = document.getElementById(`timer-display-${idx}`);
            const btn = document.getElementById(`timer-btn-${idx}`);
            btn.disabled = true;
            btn.classList.add('opacity-30');
            activeTimers[idx] = setInterval(() => {
                timeLeft--;
                const m = Math.floor(timeLeft / 60);
                const s = timeLeft % 60;
                display.innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
                if (timeLeft <= 0) {
                    clearInterval(activeTimers[idx]);
                    delete activeTimers[idx];
                    btn.disabled = false;
                    btn.classList.remove('opacity-30');
                    alert("Finish!");
                }
            }, 1000);
        };

        window.resetTimer = (seconds, idx) => {
            if (activeTimers[idx]) { clearInterval(activeTimers[idx]); delete activeTimers[idx]; }
            const display = document.getElementById(`timer-display-${idx}`);
            const btn = document.getElementById(`timer-btn-${idx}`);
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            display.innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            btn.disabled = false; btn.classList.remove('opacity-30');
        };

        async function saveSession() {
            const btn = document.getElementById('save-btn');
            btn.innerText = "UPDATING...";
            const data = currentMenu === 'A' ? menuA : menuB;
            const updates = { ...cloudData };
            
            data.forEach((item, idx) => {
                if(item.type === 'strength') {
                    updates[item.name] = {
                        weight: document.getElementById(`weight-${idx}`).value,
                        r1: document.getElementById(`r1-${idx}`).value,
                        r2: document.getElementById(`r2-${idx}`).value,
                        r3: document.getElementById(`r3-${idx}`).value
                    };
                }
            });

            await setDoc(doc(db, "users", USER_ID), updates);
            alert("Cloud Synced!");
            location.reload();
        }

        window.switchMenu = (type) => {
            currentMenu = type;
            document.getElementById('tabA').className = type === 'A' ? 'flex-1 py-3 active-tab' : 'flex-1 py-3 text-slate-500';
            document.getElementById('tabB').className = type === 'B' ? 'flex-1 py-3 active-tab' : 'flex-1 py-3 text-slate-500';
            render();
        };

        document.getElementById('tabA').onclick = () => window.switchMenu('A');
        document.getElementById('tabB').onclick = () => window.switchMenu('B');
        document.getElementById('save-btn').onclick = saveSession;

        loadData();
    </script>
</body>
</html>
